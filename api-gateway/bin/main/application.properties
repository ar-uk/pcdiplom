spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.mvc.routes[0].id=part-service
spring.cloud.gateway.mvc.routes[0].uri=lb://part-service
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/**

spring.cloud.gateway.mvc.routes[1].id=community-service
spring.cloud.gateway.mvc.routes[1].uri=lb://community-service
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/community/**

spring.cloud.gateway.mvc.routes[2].id=auth-service
spring.cloud.gateway.mvc.routes[2].uri=lb://auth-service
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/auth/**

security.jwt.secret=your-very-long-jwt-signing-secret-key-please-change-it
