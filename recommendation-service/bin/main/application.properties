spring.application.name=recommendation-service
server.port=8084

spring.datasource.url=jdbc:postgresql://localhost:5432/pcbuilder
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_recommendation
spring.flyway.baselineOnMigrate=true

eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

# OpenAI Configuration
openai.enabled=false
openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini
openai.url=https://api.openai.com/v1/chat/completions

# Part Service URL via Eureka
part-service.url=http://localhost:8081

# Logging tweaks: reduce Hibernate noise and surface recommendation-service logs
logging.level.org.hibernate=ERROR
logging.level.org.springframework.orm.jpa=ERROR
logging.level.org.springframework=ERROR
logging.level.org.example.recommendationservice=DEBUG
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
