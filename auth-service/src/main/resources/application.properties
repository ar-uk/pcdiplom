spring.application.name=auth-service
server.port=8082

spring.config.import=optional:file:${user.dir}/.env[.properties]

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

security.jwt.secret=${JWT_SECRET:your-very-long-jwt-signing-secret-key-please-change-it}
security.jwt.expiration-millis=${JWT_EXPIRATION_MILLIS:3600000}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/userpc}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
auth.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
auth.two-factor.ttl-minutes=${TWO_FACTOR_TTL_MINUTES:10}
auth.two-factor.max-attempts=${TWO_FACTOR_MAX_ATTEMPTS:5}
