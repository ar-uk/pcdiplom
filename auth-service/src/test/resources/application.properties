eureka.client.enabled=false
security.jwt.secret=your-very-long-jwt-signing-secret-key-please-change-it
security.jwt.expiration-millis=3600000

spring.datasource.url=jdbc:h2:mem:auth_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Minimal mail config so JavaMailSender bean exists (tests do not send real email).
spring.mail.host=127.0.0.1
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
auth.mail.from=test@example.com
