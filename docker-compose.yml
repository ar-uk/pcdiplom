services:
  eureka-server:
    build:
      context: ./eureka-server
    container_name: pc-eureka
    ports:
      - "8761:8761"

  part-service:
    build:
      context: ./partService
    container_name: pc-part-service
    env_file:
      - ./.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${PART_DB_NAME:-pcbuilder}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started

  recommendation-service:
    build:
      context: ./recommendation-service
    container_name: pc-recommendation-service
    env_file:
      - ./.env
      - ./recommendation-service/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${RECOMMENDATION_DB_NAME:-pcbuilder}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      PART_SERVICE_URL: http://part-service:8081
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      eureka-server:
        condition: service_started
      part-service:
        condition: service_started

  auth-service:
    build:
      context: ./auth-service
    container_name: pc-auth-service
    env_file:
      - ./.env
      - ./auth-service/.env
    environment:
      DB_URL: jdbc:postgresql://${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${AUTH_DB_NAME:-userpc}
      DB_USERNAME: ${DB_USERNAME:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started

  community-service:
    build:
      context: ./community-service
    container_name: pc-community-service
    env_file:
      - ./.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${COMMUNITY_DB_NAME:-communityDb}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started

  api-gateway:
    build:
      context: ./api-gateway
    container_name: pc-api-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:8084
      PART_SERVICE_URL: http://part-service:8081
      COMMUNITY_SERVICE_URL: http://community-service:8083
      AUTH_SERVICE_URL: http://auth-service:8082
      AUTH_VALIDATE_URL: http://auth-service:8082/auth/validate
      SECURITY_JWT_SECRET: ${JWT_SECRET:-}
    depends_on:
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      community-service:
        condition: service_started
      part-service:
        condition: service_started
      recommendation-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: pc-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      api-gateway:
        condition: service_started
